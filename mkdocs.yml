site_name: Abdelrahman's Engineering Notebook
site_url: https://abdelrahmanmagdy7077.github.io/Abdelrahman-Engineering-Notebook/
repo_url: https://github.com/abdelrahmanmagdy7077/Abdelrahman-Engineering-Notebook

theme:
  name: material
  palette:
    scheme: slate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

